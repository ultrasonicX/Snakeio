<!-- ==================== index.html ==================== -->
<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snake.IO | قتال سريع</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #0a0a1a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #startScreen { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(5,10,30,0.98); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .start-box { background: linear-gradient(135deg, rgba(20,30,55,0.95), rgba(10,15,35,0.95)); border-radius: 40px; padding: 35px 25px; width: 300px; text-align: center; border: 2px solid #0ff; box-shadow: 0 0 40px rgba(0,255,255,0.3); }
        .start-box h1 { color: #0ff; margin-bottom: 20px; font-size: 26px; }
        .start-box input, .start-box select { width: 100%; padding: 12px 16px; margin: 10px 0; background: rgba(0,0,0,0.6); border: 1.5px solid #0ff; border-radius: 40px; color: white; font-size: 14px; outline: none; }
        .start-box button { width: 100%; padding: 12px; margin-top: 15px; background: linear-gradient(90deg,#0ff,#0a6); border: none; border-radius: 40px; font-size: 20px; font-weight: bold; color: #000; cursor: pointer; transition: 0.2s; }
        #gameContainer { position: relative; width: 100vw; height: 100vh; display: none; overflow: hidden; }
        canvas { position: absolute; top:0; left:0; width:100%; height:100%; display: block; background: radial-gradient(circle at 30% 20%, #0a1030, #030618); }
        .players-list { position: absolute; left: 10px; top: 10px; background: rgba(30,35,55,0.5); backdrop-filter: blur(4px); border-radius: 8px; padding: 6px 8px; min-width: 120px; z-index: 50; pointer-events: none; font-size: 10px; }
        .player-rank-item { display: flex; justify-content: space-between; padding: 2px 5px; margin: 2px 0; color: #ddd; font-size: 9px; }
        .player-rank-name { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70px; }
        .player-rank-score { color: #ffd966; font-weight: bold; }
        .minimap { position: absolute; top: 10px; right: 10px; width: 100px; height: 100px; background: rgba(10,15,30,0.7); backdrop-filter: blur(4px); border-radius: 8px; border: 1px solid rgba(0,255,255,0.3); z-index: 50; pointer-events: none; }
        .minimap canvas { position: absolute; width:100%; height:100%; border-radius: 8px; }
        .dynamic-joystick { position: absolute; width: 110px; height: 110px; background: rgba(20,30,50,0.85); border-radius: 50%; border: 2px solid cyan; box-shadow: 0 0 15px cyan; backdrop-filter: blur(5px); display: none; z-index: 100; pointer-events: none; transform: translate(-50%,-50%); }
        .dynamic-joystick .handle { width: 45px; height: 45px; background: radial-gradient(circle at 30% 30%, #0ff, #0a8); border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); box-shadow: 0 0 18px cyan; pointer-events: none; transition: 0.02s linear; }
        .score-simple { position: fixed; top: 12px; right: 120px; background: rgba(0,0,0,0.6); padding: 3px 8px; border-radius: 15px; color: #ffd966; font-weight: bold; font-size: 14px; border: 1px solid cyan; z-index: 50; }
        .nitro-bar-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 200px; height: 12px; background: rgba(0,0,0,0.5); border-radius: 10px; border: 1px solid cyan; z-index: 100; overflow: hidden; }
        .nitro-bar-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #0ff, #0a8); border-radius: 10px; transition: width 0.05s linear; }
        .nitro-text { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); color: cyan; font-size: 10px; z-index: 101; }
        /* رسائل الموت والقتل */
        .notification { position: fixed; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 28px; font-weight: bold; text-align: center; z-index: 200; pointer-events: none; animation: fadeOut 2s forwards; white-space: nowrap; text-shadow: 0 0 10px black; }
        @keyframes fadeOut { 0% { opacity: 1; top: 30%; } 70% { opacity: 1; } 100% { opacity: 0; top: 20%; } }
        .warning-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,0.85); border-radius: 50px; padding: 12px 25px; z-index: 200; pointer-events: none; opacity: 0; transition: 0.3s; border: 2px solid #ff4444; }
        .warning-overlay .warning-text { color: #ff6666; font-size: 14px; }
        .warning-overlay .countdown { color: #ffaa44; font-size: 32px; }
    </style>
</head>
<body>
<div id="startScreen">
    <div class="start-box">
        <h1>⚡ SNAKE NEO ⚡</h1>
        <input type="text" id="playerName" maxlength="12" placeholder="اسم الثعبان" value="Snake">
        <select id="snakeColor">
            <option value="#2ecc71">🟢 أخضر</option>
            <option value="#f1c40f">🟡 ذهبي</option>
            <option value="#e84393">💖 وردي</option>
            <option value="#3498db">🔵 أزرق</option>
            <option value="#e67e22">🟠 برتقالي</option>
        </select>
        <button id="startBtn">▶ ابدأ اللعب</button>
    </div>
</div>
<div id="gameContainer">
    <div class="players-list"><div id="rankContainer"></div></div>
    <div class="minimap"><canvas id="minimapCanvas" width="100" height="100"></canvas></div>
    <div class="score-simple" id="scoreDisplay">0</div>
    <div class="warning-overlay" id="warningOverlay"><div class="warning-text">⚠️ ابتعدت عن الحقل!</div><div class="countdown" id="countdownNumber">10</div></div>
    <canvas id="gameCanvas"></canvas>
    <div id="dynamicJoystick" class="dynamic-joystick"><div class="handle" id="joystickHandle"></div></div>
    <div class="nitro-bar-container"><div class="nitro-bar-fill" id="nitroBarFill"></div></div>
    <div class="nitro-text" id="nitroText">⚡ نيترو ⚡</div>
    <div id="notificationArea"></div>
</div>

<script>
    (function() {
        const ZOOM = 0.65;
        const BOUNDARY = 1800;
        let socket = null, myId = null, players = {}, bots = [], mySnake = null;
        let camera = { x: 0, y: 0 }, cw = 0, ch = 0, animId = null;
        let joystickActive = false, jx = 0, jy = 0, jTouch = null;
        let nitroActive = false, nTouch = null;
        let targetDir = { x: 1, y: 0 };
        
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const minimapCanvas = document.getElementById('minimapCanvas');
        const minimapCtx = minimapCanvas.getContext('2d');
        const joystickDiv = document.getElementById('dynamicJoystick');
        const joystickHandle = document.getElementById('joystickHandle');
        const nitroFill = document.getElementById('nitroBarFill');
        const notificationDiv = document.getElementById('notificationArea');
        
        function showMessage(text, color) {
            const msg = document.createElement('div');
            msg.className = 'notification';
            msg.innerText = text;
            msg.style.color = color;
            msg.style.fontSize = '36px';
            notificationDiv.appendChild(msg);
            setTimeout(() => msg.remove(), 2000);
        }
        
        function resize() { cw = canvas.width = window.innerWidth; ch = canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        
        function worldToScreen(x,y) { return { x: cw/2 + (x-camera.x)*ZOOM, y: ch/2 + (y-camera.y)*ZOOM }; }
        function worldToMinimap(x,y) { const s=100/(BOUNDARY*2); return { x:(x+BOUNDARY)*s, y:(y+BOUNDARY)*s }; }
        function updateCamera() { if (mySnake?.points?.length) camera = { x: mySnake.points[0].x, y: mySnake.points[0].y }; }
        
        function drawGrid() {
            const step = 80;
            ctx.save(); ctx.strokeStyle='#555566'; ctx.lineWidth=0.7;
            for(let x=-BOUNDARY; x<=BOUNDARY; x+=step) {
                let p1=worldToScreen(x,-BOUNDARY), p2=worldToScreen(x,BOUNDARY);
                ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
            }
            for(let y=-BOUNDARY; y<=BOUNDARY; y+=step) {
                let p1=worldToScreen(-BOUNDARY,y), p2=worldToScreen(BOUNDARY,y);
                ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
            }
            ctx.restore();
        }
        function drawBoundary() {
            let tl=worldToScreen(-BOUNDARY,-BOUNDARY), br=worldToScreen(BOUNDARY,BOUNDARY);
            ctx.beginPath(); ctx.strokeStyle='#ff3333'; ctx.lineWidth=3; ctx.shadowBlur=5; ctx.shadowColor='red';
            ctx.rect(tl.x,tl.y,br.x-tl.x,br.y-tl.y); ctx.stroke();
            ctx.setLineDash([8,12]); ctx.strokeStyle='#ff6666'; ctx.lineWidth=1;
            ctx.rect(tl.x+8,tl.y+8,br.x-tl.x-16,br.y-tl.y-16); ctx.stroke();
            ctx.setLineDash([]); ctx.shadowBlur=0;
        }
        function drawSnake(s, w, isPlayer) {
            if(!s.points||s.points.length<2) return;
            let col = s.color;
            if(isPlayer && s.nitro && (Date.now()/80%2<1)) col='#ffffff';
            ctx.beginPath();
            let f=worldToScreen(s.points[0].x,s.points[0].y);
            ctx.moveTo(f.x,f.y);
            for(let i=1;i<s.points.length;i++) { let p=worldToScreen(s.points[i].x,s.points[i].y); ctx.lineTo(p.x,p.y); }
            ctx.strokeStyle=col; ctx.lineWidth=w; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.shadowBlur=8; ctx.shadowColor=col;
            ctx.stroke();
            ctx.beginPath(); ctx.moveTo(f.x,f.y);
            for(let i=1;i<s.points.length;i++) { let p=worldToScreen(s.points[i].x,s.points[i].y); ctx.lineTo(p.x,p.y); }
            ctx.strokeStyle='#ffffffaa'; ctx.lineWidth=w-4; ctx.stroke();
            let head=s.points[0], sh=worldToScreen(head.x,head.y);
            let ang=Math.atan2(s.direction.y,s.direction.x);
            let eyeSize=Math.max(3,Math.min(10,w/5)), off=w/2.2;
            let ex1=sh.x+Math.cos(ang+0.7)*off, ey1=sh.y+Math.sin(ang+0.7)*off;
            let ex2=sh.x+Math.cos(ang-0.7)*off, ey2=sh.y+Math.sin(ang-0.7)*off;
            ctx.beginPath(); ctx.arc(ex1,ey1,eyeSize,0,2*Math.PI); ctx.arc(ex2,ey2,eyeSize,0,2*Math.PI);
            ctx.fillStyle='white'; ctx.fill();
            ctx.beginPath(); ctx.arc(ex1-1.5,ey1-1,eyeSize*0.5,0,2*Math.PI); ctx.arc(ex2-1.5,ey2-1,eyeSize*0.5,0,2*Math.PI);
            ctx.fillStyle='black'; ctx.fill();
            if(isPlayer){ ctx.font=`bold ${Math.max(12,Math.min(24,w-5))}px "Segoe UI"`; ctx.fillStyle='#ccddff'; ctx.fillText(s.name,sh.x-35,sh.y-28); }
            ctx.shadowBlur=0;
        }
        function drawMinimap() {
            minimapCtx.clearRect(0,0,100,100); minimapCtx.fillStyle='rgba(10,15,40,0.8)'; minimapCtx.fillRect(0,0,100,100);
            let step=80, s=100/(BOUNDARY*2);
            minimapCtx.strokeStyle='#445566'; minimapCtx.lineWidth=0.5;
            for(let x=-BOUNDARY;x<=BOUNDARY;x+=step){ let px=(x+BOUNDARY)*s; minimapCtx.beginPath(); minimapCtx.moveTo(px,0); minimapCtx.lineTo(px,100); minimapCtx.stroke(); }
            for(let y=-BOUNDARY;y<=BOUNDARY;y+=step){ let py=(y+BOUNDARY)*s; minimapCtx.beginPath(); minimapCtx.moveTo(0,py); minimapCtx.lineTo(100,py); minimapCtx.stroke(); }
            minimapCtx.strokeStyle='#ff3333'; minimapCtx.strokeRect(0,0,100,100);
            for(let b of bots) if(b.points?.length){ let p=worldToMinimap(b.points[0].x,b.points[0].y); minimapCtx.beginPath(); minimapCtx.arc(p.x,p.y,2,0,2*Math.PI); minimapCtx.fillStyle=b.color; minimapCtx.fill(); }
            for(let id in players) if(id!==myId && players[id]?.points?.length){ let p=worldToMinimap(players[id].points[0].x,players[id].points[0].y); minimapCtx.beginPath(); minimapCtx.arc(p.x,p.y,2,0,2*Math.PI); minimapCtx.fillStyle=players[id].color; minimapCtx.fill(); }
            if(mySnake?.points?.length){ let p=worldToMinimap(mySnake.points[0].x,mySnake.points[0].y); minimapCtx.shadowBlur=4; minimapCtx.shadowColor=mySnake.color; minimapCtx.beginPath(); minimapCtx.arc(p.x,p.y,3,0,2*Math.PI); minimapCtx.fillStyle=mySnake.color; minimapCtx.fill(); minimapCtx.shadowBlur=0; minimapCtx.beginPath(); minimapCtx.arc(p.x,p.y,1.5,0,2*Math.PI); minimapCtx.fillStyle='white'; minimapCtx.fill(); }
        }
        function updateLeaderboard(){
            let all=[]; for(let id in players) all.push({name:players[id].name, score:players[id].score}); for(let b of bots) all.push({name:b.name, score:b.score});
            all.sort((a,b)=>b.score-a.score); let cont=document.getElementById('rankContainer'); cont.innerHTML='';
            for(let i=0;i<Math.min(all.length,8);i++){ let d=document.createElement('div'); d.className='player-rank-item'; d.innerHTML=`<span class="player-rank-name">${i+1}. ${all[i].name}</span><span class="player-rank-score">${Math.floor(all[i].score)}</span>`; cont.appendChild(d); }
        }
        function render() {
            if(!ctx) return;
            ctx.clearRect(0,0,cw,ch); ctx.fillStyle='#03081a'; ctx.fillRect(0,0,cw,ch);
            drawGrid(); drawBoundary();
            for(let id in players) if(id!==myId && players[id]) drawSnake(players[id], players[id].width||14, false);
            for(let b of bots) drawSnake(b, b.width||14, false);
            if(mySnake) drawSnake(mySnake, mySnake.width||14, true);
            drawMinimap(); updateLeaderboard();
            if(mySnake) { let p=mySnake.nitroFuel/100*100; nitroFill.style.width=p+'%'; }
        }
        
        // اللمس
        function handleTouchStart(e){ e.preventDefault(); if(!socket) return;
            for(let t of e.touches){
                let isLeft=t.clientX<window.innerWidth/2;
                if(isLeft && !joystickActive){ joystickActive=true; jTouch=t.identifier; jx=t.clientX; jy=t.clientY; joystickDiv.style.display='block'; joystickDiv.style.left=jx+'px'; joystickDiv.style.top=jy+'px'; joystickHandle.style.transform='translate(-50%,-50%)'; }
                else if(!isLeft && !nitroActive){ nitroActive=true; nTouch=t.identifier; socket.emit('move',{dir:targetDir, nitro:true}); }
            }
        }
        function handleTouchMove(e){ e.preventDefault();
            if(joystickActive) for(let t of e.touches) if(t.identifier===jTouch){
                let dx=t.clientX-jx, dy=t.clientY-jy, maxR=40, d=Math.hypot(dx,dy);
                let limDx=dx, limDy=dy; if(d>maxR){ limDx=dx/d*maxR; limDy=dy/d*maxR; }
                joystickHandle.style.transform=`translate(calc(-50% + ${limDx}px), calc(-50% + ${limDy}px))`;
                if(d>10){ let ang=Math.atan2(dy,dx); targetDir={x:Math.cos(ang),y:Math.sin(ang)}; socket.emit('move',{dir:targetDir, nitro:nitroActive}); }
                break;
            }
        }
        function handleTouchEnd(e){ e.preventDefault();
            for(let t of e.changedTouches){
                if(joystickActive && t.identifier===jTouch){ joystickActive=false; joystickDiv.style.display='none'; }
                if(nitroActive && t.identifier===nTouch){ nitroActive=false; socket.emit('move',{dir:targetDir, nitro:false}); }
            }
        }
        document.addEventListener('touchstart',handleTouchStart,{passive:false});
        document.addEventListener('touchmove',handleTouchMove,{passive:false});
        document.addEventListener('touchend',handleTouchEnd,{passive:false});
        document.addEventListener('touchcancel',handleTouchEnd,{passive:false});
        
        // الاتصال
        function connectToGame(name,color){
            socket=io();
            socket.on('connect',()=>{ socket.emit('join',{name,color}); });
            socket.on('init',(data)=>{ myId=data.id; players=data.players; bots=data.bots; mySnake=players[myId]; updateCamera();
                document.getElementById('startScreen').style.display='none'; document.getElementById('gameContainer').style.display='block';
                if(animId) cancelAnimationFrame(animId);
                function animate(){ render(); animId=requestAnimationFrame(animate); } animate();
            });
            socket.on('gameState',(data)=>{ players=data.players; bots=data.bots; if(players[myId]){ mySnake=players[myId]; updateCamera(); document.getElementById('scoreDisplay').innerText=Math.floor(mySnake.score); } });
            socket.on('killMessage',(data)=>{ showMessage(`🔪 قتلت ${data.victimName}!`, '#44ff44'); });
            socket.on('deathMessage',(data)=>{ showMessage(`💀 ماتت على يد ${data.killerName || 'الحدود'}`, '#ff4444'); });
            socket.on('playerJoined',()=>{}); socket.on('playerLeft',(id)=>{ delete players[id]; });
        }
        document.getElementById('startBtn').onclick=()=>{ let name=document.getElementById('playerName').value.trim(); if(!name){ alert('ادخل اسم الثعبان'); return; } let color=document.getElementById('snakeColor').value; connectToGame(name,color); };
    })();
</script>
</body>
</html>
